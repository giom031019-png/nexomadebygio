<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🤡 Scanner FINAL</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0b0f14;color:#e0e0e0}
canvas{position:fixed;top:0;left:0;z-index:-1}

header{text-align:center;padding:20px;font-size:32px;text-shadow:0 0 15px #00ccff}

nav{display:flex;justify-content:center}
nav button{margin:5px;padding:10px;background:#161b22;color:#ccc;border-radius:8px;cursor:pointer}

.tab{display:none;padding:15px}
.tab.active{display:block}

.detections{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}

.card{
background:#14181f;
padding:12px;
border-radius:12px;
width:240px;
transition:.3s;
}
.card:hover{transform:scale(1.05);box-shadow:0 0 10px #00ccff}

.prio{
box-shadow:0 0 20px red;
animation:pulse 1s infinite;
}
@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.07)}
100%{transform:scale(1)}
}

.center{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

input,button{
padding:10px;
border:none;
border-radius:6px;
margin:5px;
}

button{
background:#161b22;
color:white;
cursor:pointer;
}

.keyItem{
background:#14181f;
padding:10px;
margin:6px;
border-radius:8px;
}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<!-- LOGIN -->
<div id="login" class="center">
<h1>🔐 Enter Key</h1>
<input id="keyInput">
<br>
<button onclick="login()">Access</button>
<p id="msg"></p>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>🤡 Roba un Payaso Scanner</header>

<nav>
<button onclick="tab('dash')">Dashboard</button>
<button id="prioBtn" onclick="tab('prio')" style="display:none">Priority</button>
<button onclick="tab('leader')">Leaderboard</button>
<button onclick="tab('help')">Helpers</button>
<button id="adminBtn" onclick="tab('admin')" style="display:none">Admin</button>
</nav>

<!-- DASHBOARD -->
<div id="dash" class="tab active">
<h2>New Detections</h2>
<div id="new" class="detections"></div>

<h2>Old Detections</h2>
<div id="old" class="detections"></div>
</div>

<!-- PRIORITY -->
<div id="prio" class="tab">
<h2>🔥 Priority Detections</h2>

<h3>New Detections</h3>
<div id="pnew" class="detections"></div>

<h3>Old Detections</h3>
<div id="pold" class="detections"></div>
</div>

<!-- LEADERBOARD -->
<div id="leader" class="tab">
<h3>🏆 Top 10 Finds</h3>
<ol id="top10"></ol>

<h3>🌍 Global Finds</h3>
<ol id="global"></ol>
</div>

<!-- HELP -->
<div id="help" class="tab">
<center>
creator - gioyuhh<br>
botter - gioyuhhh<br>
funder - maicodios
</center>
</div>

<!-- ADMIN -->
<div id="admin" class="tab">
<h2>🔑 Key Panel</h2>

<input id="time" placeholder="1m / 1h / 1d">
<br>
<button onclick="gen('normal')">Generate Normal</button>
<button onclick="gen('prio')">Generate Priority</button>

<div id="keys"></div>
</div>

</div>

<script>

/* WEBHOOK */
const WEBHOOK="https://discord.com/api/webhooks/1490855576593367250/90oVcQCQCdmrmyp-19g7G0Vz93R61gliOmMoP-Zl9rv62KRCb9agJSqp4EHldOznNjT4";

/* STORAGE */
if(!localStorage.keys){
localStorage.keys=JSON.stringify([]);
}

/* LOGIN */
function login(){
let input=document.getElementById("keyInput").value;
let keys=JSON.parse(localStorage.keys);

if(input==="secretadmin123"){
unlock("admin");
sendWebhook("ADMIN LOGIN");
return;
}

let found=keys.find(k=>k.value===input);

if(!found){
msg("❌ Invalid Key");
return;
}

if(Date.now()>found.expires){
msg("⏳ Key expired");
return;
}

unlock(found.type);
sendWebhook(`LOGIN: ${found.type} key used (${input})`);
}

/* WEBHOOK */
function sendWebhook(msg){
fetch(WEBHOOK,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content:msg})
});
}

/* UNLOCK */
function unlock(type){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

if(type==="admin"){
document.getElementById("adminBtn").style.display="inline";
document.getElementById("prioBtn").style.display="inline";
loadKeys();
}

if(type==="prio"){
document.getElementById("prioBtn").style.display="inline";
}

load();
setInterval(load,3000);
}

function msg(t){document.getElementById("msg").innerText=t}

/* TABS */
function tab(t){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.getElementById(t).classList.add("active");
}

/* SCANNER */
async function load(){
let res=await fetch("https://brainrot-dashboard-ichq.onrender.com/detections");
let data=await res.json();

let newC=document.getElementById("new");
let oldC=document.getElementById("old");
let pnew=document.getElementById("pnew");
let pold=document.getElementById("pold");

newC.innerHTML="";
oldC.innerHTML="";
pnew.innerHTML="";
pold.innerHTML="";

let sorted=data.detections.sort((a,b)=>b.gen-a.gen);

sorted.forEach(d=>{

if(d.gen < 50000) return;

let expired = (Date.now()-d.timestamp)/1000 > 60;
let isPrio = d.gen > 10000000;

let base = `
<h3>${d.name}</h3>
<p>${d.gen}</p>
${expired?"<p style='color:red'>Owner Left</p>":""}
`;

/* NORMAL */
let normalCard = `<div class="card">${base}</div>`;
expired ? oldC.innerHTML += normalCard : newC.innerHTML += normalCard;

/* PRIORITY */
if(isPrio){
let prioCard = `<div class="card prio">${base}</div>`;
expired ? pold.innerHTML += prioCard : pnew.innerHTML += prioCard;
}

});

/* LEADERBOARD */
let top10=document.getElementById("top10");
let global=document.getElementById("global");

top10.innerHTML="";
global.innerHTML="";

sorted.slice(0,10).forEach(d=>{
top10.innerHTML+=`<li>${d.name} (${d.gen})</li>`;
});

sorted.forEach(d=>{
global.innerHTML+=`<li>${d.name} (${d.gen})</li>`;
});
}

/* KEY GEN */
function gen(type){
let t=document.getElementById("time").value;
if(!t)return alert("Enter time");

let ms=0;
if(t.endsWith("m")) ms=parseInt(t)*60000;
if(t.endsWith("h")) ms=parseInt(t)*3600000;
if(t.endsWith("d")) ms=parseInt(t)*86400000;

let key=Math.random().toString(36).substring(2,10);

let keys=JSON.parse(localStorage.keys);
keys.push({
value:key,
type:type,
expires:Date.now()+ms
});

localStorage.keys=JSON.stringify(keys);

alert(`${type} key: ${key}`);
loadKeys();
}

function loadKeys(){
let keys=JSON.parse(localStorage.keys);
let div=document.getElementById("keys");
div.innerHTML="";

keys.forEach(k=>{
div.innerHTML+=`
<div class="keyItem">
${k.value} (${k.type})<br>
Expires: ${new Date(k.expires).toLocaleString()}
<button onclick="del('${k.value}')">Delete</button>
</div>`;
});
}

function del(k){
let keys=JSON.parse(localStorage.keys);
keys=keys.filter(x=>x.value!==k);
localStorage.keys=JSON.stringify(keys);
loadKeys();
}

/* RAIN */
const c=document.getElementById("rain");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let drops=Array.from({length:200},()=>({x:Math.random()*c.width,y:Math.random()*c.height}));

setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="rgba(0,150,255,0.2)";
drops.forEach(d=>{
ctx.fillRect(d.x,d.y,2,10);
d.y+=5;
if(d.y>c.height)d.y=0;
});
},30);

</script>

</body>
</html>
