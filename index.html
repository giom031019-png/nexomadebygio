<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🤡 Scanner</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0b0f14;color:#e0e0e0}
canvas{position:fixed;top:0;left:0;z-index:-1}

header{text-align:center;padding:20px;font-size:30px;text-shadow:0 0 15px #00ccff}

nav{display:flex;justify-content:center}
nav button{margin:5px;padding:10px;background:#161b22;color:#ccc;border-radius:8px;cursor:pointer}
nav button:hover{background:#222}

.tab{display:none;padding:15px}
.tab.active{display:block}

.detections{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}

.card{background:#14181f;padding:10px;border-radius:10px;width:230px;transition:.3s}
.card:hover{transform:scale(1.05);box-shadow:0 0 10px #00ccff}

.prio{box-shadow:0 0 10px red}

input,button{padding:10px;border:none;border-radius:6px;margin:5px}
button{background:#161b22;color:white;cursor:pointer}

.keyItem{background:#14181f;padding:10px;margin:5px;border-radius:8px}
.center{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);text-align:center}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<!-- LOGIN -->
<div id="login" class="center">
<h1>🔐 Enter Key</h1>
<input id="keyInput" placeholder="Enter key">
<br>
<button onclick="login()">Access</button>
<p id="msg"></p>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>🤡 Roba un Payaso Scanner</header>

<nav>
<button onclick="tab('dash')">Dashboard</button>
<button onclick="tab('prio')">Priority</button>
<button onclick="tab('lead')">Leaderboard</button>
<button onclick="tab('help')">Helpers</button>
<button id="adminBtn" onclick="tab('admin')" style="display:none">Admin</button>
</nav>

<div id="dash" class="tab active">
<div id="list" class="detections"></div>
</div>

<div id="prio" class="tab">
<div id="plist" class="detections"></div>
</div>

<div id="lead" class="tab">
<h3>Top 10</h3>
<ol id="top"></ol>
</div>

<div id="help" class="tab">
<center>
creator - gioyuhh<br>
botter - gioyuhhh<br>
funder - maicodios
</center>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="tab">
<h2>🔑 Key Panel</h2>

<input id="expire" placeholder="minutes (ex: 60)">
<button onclick="generateKey()">Generate Key</button>

<div id="keys"></div>
</div>

</div>

<script>

/* STORAGE */
if(!localStorage.keys){
localStorage.keys = JSON.stringify(["test123"]); // default key
}

/* LOGIN */
function login(){
let input=document.getElementById("keyInput").value;
let keys=JSON.parse(localStorage.keys);

if(input==="secretadmin123"){
unlock(true);
return;
}

if(keys.includes(input)){
unlock(false);
}else{
msg("❌ Invalid Key");
}
}

function unlock(admin){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

if(admin){
document.getElementById("adminBtn").style.display="inline-block";
loadKeys();
}

load();
setInterval(load,3000);
}

function msg(t){
document.getElementById("msg").innerText=t;
}

/* TABS */
function tab(id){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* SCANNER */
async function load(){
let res=await fetch("https://brainrot-dashboard-ichq.onrender.com/detections");
let data=await res.json();

let list=document.getElementById("list");
let plist=document.getElementById("plist");
list.innerHTML="";
plist.innerHTML="";

let sorted=data.detections.sort((a,b)=>b.gen-a.gen);

sorted.forEach(d=>{
if(d.gen<50000)return;

let card=`<div class="card">
<h3>${d.name}</h3>
<p>${d.gen}</p>
</div>`;

if(d.gen>10000000){
plist.innerHTML+=card;
}else{
list.innerHTML+=card;
}
});

/* leaderboard */
let top=document.getElementById("top");
top.innerHTML="";
sorted.slice(0,10).forEach(d=>{
top.innerHTML+=`<li>${d.name} (${d.gen})</li>`;
});
}

/* KEY PANEL */
function generateKey(){
let minutes=parseInt(document.getElementById("expire").value);
if(!minutes)return alert("Enter minutes");

let key=Math.random().toString(36).substring(2,10);

let keys=JSON.parse(localStorage.keys);
keys.push(key);
localStorage.keys=JSON.stringify(keys);

alert("Generated key: "+key);
loadKeys();
}

function loadKeys(){
let keys=JSON.parse(localStorage.keys);
let div=document.getElementById("keys");
div.innerHTML="";

keys.forEach(k=>{
div.innerHTML+=`
<div class="keyItem">
${k}
<button onclick="deleteKey('${k}')">Delete</button>
</div>
`;
});
}

function deleteKey(k){
let keys=JSON.parse(localStorage.keys);
keys=keys.filter(x=>x!==k);
localStorage.keys=JSON.stringify(keys);
loadKeys();
}

/* RAIN */
const c=document.getElementById("rain");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let drops=Array.from({length:200},()=>({x:Math.random()*c.width,y:Math.random()*c.height}));

setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="rgba(0,150,255,0.2)";
drops.forEach(d=>{
ctx.fillRect(d.x,d.y,2,10);
d.y+=5;
if(d.y>c.height)d.y=0;
});
},30);

</script>

</body>
</html>
