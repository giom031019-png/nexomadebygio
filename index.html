<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🤡 Scanner</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0b0f14;color:#e0e0e0;overflow-x:hidden}
canvas{position:fixed;top:0;left:0;z-index:-1}

header{text-align:center;padding:20px;font-size:30px;text-shadow:0 0 15px #00ccff}

nav{display:flex;justify-content:center}
nav button{margin:5px;padding:10px;background:#161b22;color:#ccc;border-radius:8px;cursor:pointer}
nav button:hover{background:#222}

.tab{display:none;padding:15px}
.tab.active{display:block}

.detections{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}

.card{background:#14181f;padding:10px;border-radius:10px;width:230px;transition:.3s}
.card:hover{transform:scale(1.05);box-shadow:0 0 10px #00ccff}

.prio{box-shadow:0 0 10px red}
.insane{animation:shake .5s infinite}

@keyframes shake{
0%{transform:translate(0)}
50%{transform:translate(2px)}
100%{transform:translate(0)}
}

input,button{padding:8px;border:none;border-radius:6px;margin:5px}
button{background:#161b22;color:white;cursor:pointer}

.keyItem{background:#14181f;padding:10px;margin:5px;border-radius:8px}

</style>
</head>

<body>

<canvas id="rain"></canvas>

<div id="app" style="display:none">

<header>🤡 Roba un Payaso Scanner</header>

<nav>
<button onclick="tab('dash')">Dashboard</button>
<button onclick="tab('prio')">Priority</button>
<button onclick="tab('lead')">Leaderboard</button>
<button onclick="tab('help')">Helpers</button>
<button id="adminTab" onclick="tab('keys')" style="display:none">Keys</button>
</nav>

<!-- DASH -->
<div id="dash" class="tab active">
<div id="list" class="detections"></div>
</div>

<!-- PRIO -->
<div id="prio" class="tab">
<div id="plist" class="detections"></div>
</div>

<!-- LEADER -->
<div id="lead" class="tab">
<h3>Top 10</h3>
<ol id="top"></ol>
</div>

<!-- HELP -->
<div id="help" class="tab">
<center>
creator - gioyuhh<br>
botter - gioyuhhh<br>
funder - maicodios
</center>
</div>

<!-- KEY PANEL -->
<div id="keys" class="tab">
<h2>🔑 Key Panel</h2>

<input id="exp" placeholder="1h / 1d">
<button onclick="gen()">Generate</button>

<div id="klist"></div>
</div>

</div>

<script>

/* CONFIG */
const URL="https://wfqydktbiarmlogkgniu.supabase.co";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.nfqeTkKMKDe6uLmypFXJ12HKw96ZBPeZuVKqNx5ikwY";

/* LOGIN */
window.onload=async()=>{

let k=prompt("Enter key");
if(!k) return;

let res=await fetch(`${URL}/rest/v1/keys?key=eq.${k}`,{
headers:{apikey:KEY,Authorization:"Bearer "+KEY}
});

let d=await res.json();
if(!d.length) return deny();

let key=d[0];

if(Date.now()>key.expires_at) return deny();

/* admin */
if(key.role==="admin"){
document.getElementById("adminTab").style.display="inline-block";
loadKeys();
}

document.getElementById("app").style.display="block";
load();
setInterval(load,3000);

};

/* DENY */
function deny(){
document.body.innerHTML="<h1 style='text-align:center'>Invalid Key</h1>";
}

/* TABS */
function tab(t){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.getElementById(t).classList.add("active");
}

/* SCANNER */
async function load(){

let res=await fetch("https://brainrot-dashboard-ichq.onrender.com/detections");
let data=await res.json();

let list=document.getElementById("list");
let plist=document.getElementById("plist");

list.innerHTML="";
plist.innerHTML="";

let sorted=[...data.detections].sort((a,b)=>b.gen-a.gen);

/* dashboard */
sorted.forEach(d=>{

if(d.gen<50000) return;

let card=`<div class="card">
<h3>${d.name}</h3>
<p>${d.gen}</p>
</div>`;

if(d.gen>10000000){
plist.innerHTML+=card;
}else{
list.innerHTML+=card;
}

});

/* leaderboard */
let top=document.getElementById("top");
top.innerHTML="";
sorted.slice(0,10).forEach(d=>{
top.innerHTML+=`<li>${d.name} (${d.gen})</li>`;
});

}

/* KEY SYSTEM */
async function gen(){

let e=document.getElementById("exp").value;

let ms=0;
if(e.endsWith("h")) ms=parseInt(e)*3600000;
if(e.endsWith("d")) ms=parseInt(e)*86400000;

let key=Math.random().toString(36).substring(2,10);

await fetch(`${URL}/rest/v1/keys`,{
method:"POST",
headers:{apikey:KEY,Authorization:"Bearer "+KEY,"Content-Type":"application/json"},
body:JSON.stringify({
key:key,
expires_at:Date.now()+ms,
used_by:"",
role:"user"
})
});

alert("Key: "+key);
loadKeys();

}

async function loadKeys(){

let res=await fetch(`${URL}/rest/v1/keys`,{
headers:{apikey:KEY,Authorization:"Bearer "+KEY}
});

let data=await res.json();

let div=document.getElementById("klist");
div.innerHTML="";

data.forEach(k=>{
div.innerHTML+=`
<div class="keyItem">
<p>${k.key}</p>
<p>${new Date(k.expires_at).toLocaleString()}</p>
<p>${k.used_by||"unused"}</p>
<button onclick="del('${k.key}')">Delete</button>
</div>
`;
});

}

async function del(k){
await fetch(`${URL}/rest/v1/keys?key=eq.${k}`,{
method:"DELETE",
headers:{apikey:KEY,Authorization:"Bearer "+KEY}
});
loadKeys();
}

/* RAIN */
const c=document.getElementById("rain");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let drops=Array.from({length:200},()=>({x:Math.random()*c.width,y:Math.random()*c.height}));

setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="rgba(0,150,255,0.2)";
drops.forEach(d=>{
ctx.fillRect(d.x,d.y,2,10);
d.y+=5;
if(d.y>c.height)d.y=0;
});
},30);

</script>

</body>
</html>
