<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🤡 Scanner Final</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0b0f14;color:#e0e0e0}
canvas{position:fixed;top:0;left:0;z-index:-1}

header{text-align:center;padding:20px;font-size:32px;text-shadow:0 0 15px #00ccff}

nav{display:flex;justify-content:center}
nav button{margin:5px;padding:10px;background:#161b22;color:#ccc;border-radius:8px;cursor:pointer}
nav button:hover{background:#222}

.tab{display:none;padding:15px}
.tab.active{display:block}

.detections{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}

.card{
background:#14181f;
padding:12px;
border-radius:12px;
width:240px;
transition:.3s;
}
.card:hover{transform:scale(1.05);box-shadow:0 0 10px #00ccff}

/* 🔥 PRIORITY EFFECT */
.prio{
box-shadow:0 0 20px red;
animation:pulse 1s infinite;
}
@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.07)}
100%{transform:scale(1)}
}

/* LOGIN */
.center{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

input,button{
padding:10px;
border:none;
border-radius:6px;
margin:5px;
}

button{
background:#161b22;
color:white;
cursor:pointer;
}

.keyItem{
background:#14181f;
padding:10px;
margin:6px;
border-radius:8px;
}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<!-- LOGIN -->
<div id="login" class="center">
<h1>🔐 Enter Key</h1>
<input id="keyInput" placeholder="Enter key">
<br>
<button onclick="login()">Access</button>
<p id="msg"></p>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">

<header>🤡 Roba un Payaso Scanner</header>

<nav>
<button onclick="tab('dash')">Dashboard</button>
<button id="prioBtn" onclick="tab('prio')" style="display:none">Priority</button>
<button onclick="tab('leader')">Leaderboard</button>
<button onclick="tab('help')">Helpers</button>
<button id="adminBtn" onclick="tab('admin')" style="display:none">Admin</button>
</nav>

<!-- DASHBOARD -->
<div id="dash" class="tab active">
<h2>New</h2>
<div id="new" class="detections"></div>

<h2>Old</h2>
<div id="old" class="detections"></div>
</div>

<!-- PRIORITY -->
<div id="prio" class="tab">
<h2>🔥 Priority Finds</h2>

<h3>New</h3>
<div id="pnew" class="detections"></div>

<h3>Old</h3>
<div id="pold" class="detections"></div>
</div>

<!-- LEADERBOARD -->
<div id="leader" class="tab">
<h3>🏆 Top 10 Finds</h3>
<ol id="top10"></ol>

<h3>🌍 Global Finds</h3>
<ol id="global"></ol>
</div>

<!-- HELP -->
<div id="help" class="tab">
<center>
creator - gioyuhh<br>
botter - gioyuhhh<br>
funder - maicodios
</center>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="tab">
<h2>🔑 Key Generator</h2>

<button onclick="gen('normal')">Generate Normal Key</button>
<button onclick="gen('prio')">Generate Priority Key</button>

<div id="keys"></div>
</div>

</div>

<script>

/* STORAGE INIT */
if(!localStorage.keys){
localStorage.keys = JSON.stringify([]);
}

/* LOGIN */
function login(){
let input=document.getElementById("keyInput").value;
let keys=JSON.parse(localStorage.keys);

if(input==="secretadmin123"){
unlock("admin");
return;
}

let found=keys.find(k=>k.value===input);

if(!found){
msg("❌ Invalid Key");
return;
}

unlock(found.type);
}

/* UNLOCK */
function unlock(type){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

if(type==="admin"){
document.getElementById("adminBtn").style.display="inline";
document.getElementById("prioBtn").style.display="inline";
loadKeys();
}

if(type==="prio"){
document.getElementById("prioBtn").style.display="inline";
}

load();
setInterval(load,3000);
}

function msg(t){
document.getElementById("msg").innerText=t;
}

/* TABS */
function tab(t){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.getElementById(t).classList.add("active");
}

/* SCANNER */
async function load(){
try{
let res=await fetch("https://brainrot-dashboard-ichq.onrender.com/detections");
let data=await res.json();

let newC=document.getElementById("new");
let oldC=document.getElementById("old");
let pnew=document.getElementById("pnew");
let pold=document.getElementById("pold");

newC.innerHTML="";
oldC.innerHTML="";
pnew.innerHTML="";
pold.innerHTML="";

let sorted=data.detections.sort((a,b)=>b.gen-a.gen);

sorted.forEach(d=>{

if(d.gen<50000)return;

let expired=(Date.now()-d.timestamp)/1000>60;

let base=`
<h3>${d.name}</h3>
<p>${d.gen}</p>
${expired?"<p style='color:red'>Owner Left</p>":""}
`;

if(d.gen>10000000){
let card=`<div class="card prio">${base}</div>`;
expired?pold.innerHTML+=card:pnew.innerHTML+=card;
}else{
let card=`<div class="card">${base}</div>`;
expired?oldC.innerHTML+=card:newC.innerHTML+=card;
}

});

/* LEADERBOARD */
let top10=document.getElementById("top10");
let global=document.getElementById("global");

top10.innerHTML="";
global.innerHTML="";

sorted.slice(0,10).forEach(d=>{
top10.innerHTML+=`<li>${d.name} (${d.gen})</li>`;
});

sorted.forEach(d=>{
global.innerHTML+=`<li>${d.name} (${d.gen})</li>`;
});

}catch(e){
console.log("ERROR:",e);
}
}

/* KEY SYSTEM */
function gen(type){
let key=Math.random().toString(36).substring(2,10);

let keys=JSON.parse(localStorage.keys);
keys.push({value:key,type:type});
localStorage.keys=JSON.stringify(keys);

alert(`${type.toUpperCase()} KEY: ${key}`);
loadKeys();
}

function loadKeys(){
let keys=JSON.parse(localStorage.keys);
let div=document.getElementById("keys");
div.innerHTML="";

keys.forEach(k=>{
div.innerHTML+=`
<div class="keyItem">
${k.value} (${k.type})
<button onclick="del('${k.value}')">Delete</button>
</div>
`;
});
}

function del(k){
let keys=JSON.parse(localStorage.keys);
keys=keys.filter(x=>x.value!==k);
localStorage.keys=JSON.stringify(keys);
loadKeys();
}

/* RAIN BACKGROUND */
const c=document.getElementById("rain");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let drops=Array.from({length:200},()=>({x:Math.random()*c.width,y:Math.random()*c.height}));

setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="rgba(0,150,255,0.2)";
drops.forEach(d=>{
ctx.fillRect(d.x,d.y,2,10);
d.y+=5;
if(d.y>c.height)d.y=0;
});
},30);

</script>

</body>
</html>
