<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{background:#0b0f14;color:white;font-family:sans-serif;text-align:center}
.tab{display:none}
.active{display:block}
</style>
</head>

<body>

<div id="login">
<h2>Enter Key</h2>
<input id="keyInput">
<button onclick="login()">Login</button>
<p id="error"></p>
</div>

<div id="main" style="display:none">

<button onclick="show('normal')">Normal</button>
<button onclick="show('prio')">Priority</button>
<button onclick="show('keys')">Keys</button>

<div id="normal" class="tab active"><h2>Normal Dashboard</h2></div>
<div id="prio" class="tab"><h2>Priority Dashboard</h2></div>

<div id="keys" class="tab">
<h2>Generate Key</h2>

<select id="type">
<option value="normal">Normal</option>
<option value="priority">Priority</option>
</select>

<input id="expire" placeholder="1m / 1h">
<br>

<button onclick="generate()">Generate</button>

<div id="status"></div>
<div id="list"></div>

</div>

</div>

<script>

const URL = "https://wfqydktbiarmlogkgniu.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmcXlka3RiaWFybWxvZ2tnbml1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTE0MzYsImV4cCI6MjA5MTE2NzQzNn0.nfqeTkKMKDe6uLmypFXJ12HKw96ZBPeZuVKqNx5ikwY";

const ADMIN = "mysecretadmin123";

let userType = "normal";

// create key
function makeKey(){
return "brainrot-"+Math.random().toString(36).substring(2,10);
}

// expire
function parse(t){
if(!t)return null;
let n=parseInt(t);
if(t.includes("m"))return Date.now()+n*60000;
if(t.includes("h"))return Date.now()+n*3600000;
}

// 🔑 GENERATE
async function generate(){

let k = makeKey();
let type = document.getElementById("type").value;
let exp = parse(document.getElementById("expire").value);

let res = await fetch(`${URL}/rest/v1/keys`,{
method:"POST",
headers:{
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json",
Prefer:"return=representation"
},
body:JSON.stringify({
key:k,
used:false,
type:type,
expire_at:exp
})
});

let data = await res.json();

document.getElementById("status").innerText="Generated!";
add(data[0]);
}

// add to UI
function add(k){
let d=document.createElement("div");
d.innerHTML = `
<b>${k.key}</b> (${k.type})
<button onclick="del('${k.key}',this)">Delete</button>
`;
document.getElementById("list").prepend(d);
}

// delete
async function del(k,el){
await fetch(`${URL}/rest/v1/keys?key=eq.${k}`,{
method:"DELETE",
headers:{apikey:KEY,Authorization:"Bearer "+KEY}
});
el.parentElement.remove();
}

// 🔐 LOGIN FIXED
async function login(){

let k = document.getElementById("keyInput").value;

// admin
if(k===ADMIN){
open("priority");
return;
}

// fetch key
let res = await fetch(`${URL}/rest/v1/keys?key=eq.${k}`,{
headers:{apikey:KEY,Authorization:"Bearer "+KEY}
});

let data = await res.json();

if(data.length===0){
document.getElementById("error").innerText="Invalid key";
return;
}

let key = data[0];

// expired
if(key.expire_at && Date.now()>key.expire_at){
document.getElementById("error").innerText="Expired";
return;
}

// save type
userType = key.type || "normal";

// mark used
await fetch(`${URL}/rest/v1/keys?key=eq.${k}`,{
method:"PATCH",
headers:{
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({used:true})
});

// open dashboard
open(userType);
}

// open dashboard
function open(type){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

if(type==="normal"){
document.querySelector("button[onclick=\"show('prio')\"]").style.display="none";
}
}

// switch tabs
function show(id){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
