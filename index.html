<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🤡 Scanner Dashboard</title>

<style>
body{
margin:0;
background:#0b0f14;
color:#e0e0e0;
font-family:'Segoe UI';
overflow-x:hidden;
}

/* HEADER */
header{
text-align:center;
padding:20px;
font-size:34px;
color:#fff;
text-shadow:0 0 20px #00ccff;
}

/* NAV */
nav{
display:flex;
justify-content:center;
gap:10px;
}

nav button{
padding:10px 18px;
background:#161b22;
border:none;
border-radius:8px;
color:#ccc;
cursor:pointer;
transition:0.3s;
}

nav button:hover{
transform:scale(1.1);
box-shadow:0 0 15px #00ccff;
color:white;
}

/* TABS */
.tab{display:none;padding:15px;animation:fade 0.4s ease}
.tab.active{display:block}

/* CARDS */
.card{
background:#14181f;
border-radius:12px;
padding:12px;
margin:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 0 15px #00ccff;
}

/* PRIORITY EFFECT */
.prio{
animation:prioGlow 1s infinite alternate;
}

@keyframes prioGlow{
from{box-shadow:0 0 10px red}
to{box-shadow:0 0 25px orange}
}

/* 100M INSANE */
.insane{
animation:insane 0.5s infinite;
}

@keyframes insane{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* TEXT COLORS */
.best{color:#00ffcc}
.top{color:#ff4d4d}

/* LEADERBOARD */
.leaderboard{
background:#14181f;
padding:10px;
border-radius:10px;
margin:10px;
}

h2{text-align:center;color:#00ccff}

/* FADE */
@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<header>🤡 Scanner Dashboard</header>

<nav>
<button onclick="show('normal')">Dashboard</button>
<button onclick="show('prio')">Priority</button>
<button onclick="show('leader')">Leaderboards</button>
<button onclick="show('helpers')">Helpers</button>
</nav>

<!-- NORMAL -->
<div id="normal" class="tab active">
<h2>Normal Finds</h2>
<div id="normal-list"></div>
</div>

<!-- PRIORITY -->
<div id="prio" class="tab">
<h2>🔥 Priority Finds</h2>
<div id="prio-list"></div>
</div>

<!-- LEADERBOARD -->
<div id="leader" class="tab">

<div class="leaderboard">
<h2>🏆 Top 10 Best Finds</h2>
<ol id="top10"></ol>
</div>

<div class="leaderboard">
<h2>🌍 Global Finds</h2>
<ol id="global"></ol>
</div>

</div>

<!-- HELPERS -->
<div id="helpers" class="tab">
<div class="card">
<h2>👥 Team</h2>
<p>creator - gioyuhh</p>
<p>botter - gioyuhhh</p>
<p>funder - maicodios</p>
</div>
</div>

<script>

/* DEMO DATA (replace later with real supabase) */
let data = [
{name:"Clown",gen:60000},
{name:"RareX",gen:900000},
{name:"BestOne",gen:2000000},
{name:"Mega",gen:5000000},
{name:"Ultra",gen:15000000},
{name:"INSANE",gen:120000000}
];

/* FORMAT */
function format(n){
if(n>=1e6)return (n/1e6).toFixed(1)+"M";
if(n>=1e3)return (n/1e3).toFixed(1)+"K";
return n;
}

/* RENDER */
function update(){

let normal=document.getElementById("normal-list");
let prio=document.getElementById("prio-list");

normal.innerHTML="";
prio.innerHTML="";

/* SORT */
let sorted=[...data].sort((a,b)=>b.gen-a.gen);

/* LOOP */
sorted.forEach(d=>{

if(d.gen<50000)return;

/* NORMAL */
if(d.gen>=50000 && d.gen<2500000){

let tag="";
if(d.gen>=1000000) tag="<span class='best'>BEST</span>";

normal.innerHTML+=`
<div class="card">
<h3>${d.name}</h3>
<p>${format(d.gen)} ${tag}</p>
</div>
`;

}

/* PRIORITY */
if(d.gen>=2500000){

let cls="card prio";
let tag="";

if(d.gen>=100000000){
cls+=" insane";
tag="<span class='top'>💀 100M+</span>";
}else if(d.gen>=10000000){
tag="<span class='top'>TOP PRIORITY</span>";
}

prio.innerHTML+=`
<div class="${cls}">
<h3>${d.name}</h3>
<p>${format(d.gen)} ${tag}</p>
</div>
`;

}

});

/* LEADERBOARDS */
let top=document.getElementById("top10");
let global=document.getElementById("global");

top.innerHTML="";
global.innerHTML="";

sorted.slice(0,10).forEach(d=>{
top.innerHTML+=`<li>${d.name} (${format(d.gen)})</li>`;
});

sorted.forEach(d=>{
global.innerHTML+=`<li>${d.name} (${format(d.gen)})</li>`;
});

}

/* LOOP */
setInterval(update,1500);

/* TABS */
function show(id){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
