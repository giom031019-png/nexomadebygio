<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🤡 Scanner Dashboard</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#0b0f14;color:#e0e0e0}

header{text-align:center;padding:20px;font-size:32px;color:#fff;text-shadow:0 0 15px #00ccff}

nav{display:flex;justify-content:center}
nav button{margin:5px;padding:10px 18px;background:#161b22;border-radius:8px;color:#ccc;cursor:pointer}
nav button:hover{background:#222}

.tab{display:none;padding:15px}
.tab.active{display:block}

.key-box{
background:#14181f;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.key-box input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
width:200px;
}

.key-box button{
padding:10px;
margin:5px;
background:#00ccff;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.key-list{
margin-top:20px;
max-height:350px;
overflow:auto;
}

.key-item{
padding:10px;
margin:5px;
border-radius:8px;
background:#1a1f27;
}

.delete-btn{
background:red;
border:none;
padding:5px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

#status{margin-top:10px;font-size:14px}

#login-screen{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

#dashboard-wrapper{display:none}
</style>
</head>

<body>

<div id="login-screen">
<h1>🔐 Enter Key</h1>
<input id="keyInput" placeholder="Enter key">
<button onclick="login()">Login</button>
<p id="error"></p>
</div>

<div id="dashboard-wrapper">

<header>🤡 Scanner Dashboard</header>

<nav>
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('keys')">Key Panel</button>
</nav>

<div id="dashboard" class="tab active">
<h2>Dashboard Running ✅</h2>
</div>

<div id="keys" class="tab">
<div class="key-box">

<h2>🔑 Key Generator</h2>

<input id="expireInput" placeholder="1m / 1h / 5h">
<br>

<button onclick="generateKey()">Generate Key</button>

<div id="status"></div>

<div id="key-list" class="key-list"></div>

</div>
</div>

</div>

<script>

const SUPABASE_URL = "https://wfqydktbiarmlogkgniu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmcXlka3RiaWFybWxvZ2tnbml1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTE0MzYsImV4cCI6MjA5MTE2NzQzNn0.nfqeTkKMKDe6uLmypFXJ12HKw96ZBPeZuVKqNx5ikwY";

const ADMIN_KEY = "mysecretadmin123";

// 🔑 create key
function createKey(){
return "brainrot-" + Math.random().toString(36).substring(2,10).toUpperCase();
}

// ⏱️ expiration
function parseExpire(input){
if(!input) return null;
let num = parseInt(input);
if(input.includes("m")) return Date.now()+num*60000;
if(input.includes("h")) return Date.now()+num*3600000;
return null;
}

// 🔥 GENERATE KEY (FIXED)
async function generateKey(){
const status = document.getElementById("status");
status.innerText = "Generating...";

try{

const key = createKey();
const expire = parseExpire(document.getElementById("expireInput").value);

const res = await fetch(`${SUPABASE_URL}/rest/v1/keys`,{
method:"POST",
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json",
"Prefer":"return=representation"
},
body: JSON.stringify({
key:key,
used:false,
hwid:null,
expire_at:expire
})
});

if(!res.ok){
const err = await res.text();
status.innerText = "❌ ERROR: " + err;
console.error(err);
return;
}

const data = await res.json();

if(!data || !data[0]){
status.innerText = "❌ No data returned (check RLS)";
return;
}

// ✅ ADD TO UI
addKey(data[0]);

status.innerText = "✅ Key Generated!";

}catch(e){
status.innerText = "❌ " + e.message;
console.error(e);
}
}

// ➕ ADD KEY TO LIST
function addKey(k){
const list = document.getElementById("key-list");

const div = document.createElement("div");
div.className="key-item";

div.innerHTML=`
<b>${k.key}</b><br>
Status: ACTIVE<br>
Expires: ${k.expire_at ? new Date(k.expire_at).toLocaleString() : "Never"}
<br>
<button class="delete-btn" onclick="deleteKey('${k.key}', this)">Delete</button>
`;

list.prepend(div);
}

// ❌ DELETE
async function deleteKey(key, btn){
await fetch(`${SUPABASE_URL}/rest/v1/keys?key=eq.${key}`,{
method:"DELETE",
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer "+SUPABASE_KEY
}
});
btn.parentElement.remove();
}

// 🔐 LOGIN
async function login(){
const key = document.getElementById("keyInput").value;

if(key === ADMIN_KEY){
document.getElementById("login-screen").style.display="none";
document.getElementById("dashboard-wrapper").style.display="block";
return;
}

document.getElementById("error").innerText="Invalid key";
}

function showTab(id){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
