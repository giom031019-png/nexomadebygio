<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🤡 Roba un Payaso Scanner</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#0b0f14;color:#e0e0e0;overflow-x:hidden}
canvas{position:fixed;top:0;left:0;z-index:-1}

header{text-align:center;padding:20px;font-size:34px;color:#fff;text-shadow:0 0 20px #00ccff}

nav{display:flex;justify-content:center;padding:10px}
nav button{margin:0 8px;padding:10px 18px;background:#161b22;border-radius:8px;color:#ccc;cursor:pointer;transition:.3s}
nav button:hover{transform:scale(1.1);box-shadow:0 0 15px #00ccff;color:white}

.tab{display:none;padding:15px;animation:fade .4s}
.tab.active{display:block}

.stats{display:flex;justify-content:space-around}

.detections{display:flex;flex-wrap:wrap;gap:15px;justify-content:center}

.card{
background:#14181f;border-radius:12px;padding:12px;width:260px;
transition:.3s
}
.card:hover{transform:scale(1.05);box-shadow:0 0 15px #00ccff}

.prio{box-shadow:0 0 15px red}
.insane{animation:insane .6s infinite}

@keyframes insane{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

.best{color:#00ffcc}
.top{color:#ff4d4d}

.leaderboards{display:flex;gap:20px}
.leaderboard{flex:1;background:#14181f;padding:10px;border-radius:10px}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<div id="dashboard-wrapper" style="display:none">

<header>🤡 Roba un Payaso Scanner</header>

<nav>
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('priority')">Priority</button>
<button onclick="showTab('leaderboard')">Leaderboard</button>
<button onclick="showTab('helpers')">Helpers</button>
</nav>

<!-- DASHBOARD -->
<div id="dashboard" class="tab active">
<div class="stats">
<div><div id="total">0</div><div>Total</div></div>
<div><div id="best">None</div><div>Best</div></div>
</div>

<h2>New</h2>
<div id="new-detections" class="detections"></div>

<h2>Old</h2>
<div id="old-detections" class="detections"></div>
</div>

<!-- PRIORITY -->
<div id="priority" class="tab">
<h2>🔥 Priority</h2>
<div id="priority-new" class="detections"></div>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="tab">
<div class="leaderboards">
<div class="leaderboard"><h3>Top 10</h3><ol id="top-brainrots"></ol></div>
<div class="leaderboard"><h3>Global</h3><ol id="global-finds"></ol></div>
</div>
</div>

<!-- HELPERS -->
<div id="helpers" class="tab">
<center>
creator - gioyuhh<br>
botter - gioyuhhh<br>
funder - maicodios
</center>
</div>

</div>

<script>

/* 🔐 SUPABASE */
const URL="https://wfqydktbiarmlogkgniu.supabase.co";
const KEY="PUT YOUR ANON KEY HERE";

/* LOGIN */
window.onload=async()=>{
let userKey=prompt("Enter Access Key:");

if(!userKey)return deny();

try{
const res=await fetch(`${URL}/rest/v1/keys?key=eq.${userKey}`,{
headers:{apikey:KEY,Authorization:"Bearer "+KEY}
});

const data=await res.json();

if(!data.length)return deny();

const k=data[0];

if(Date.now()>k.expires_at)return deny();

/* mark used */
await fetch(`${URL}/rest/v1/keys?key=eq.${userKey}`,{
method:"PATCH",
headers:{
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({used_by:"user"})
});

document.getElementById("dashboard-wrapper").style.display="block";
loadData();
setInterval(loadData,3000);

}catch(e){deny();}
};

function deny(){
document.body.innerHTML="<h1 style='text-align:center;margin-top:20%'>Invalid Key</h1>";
}

/* TABS */
function showTab(id){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* FORMAT */
function formatGen(g){
return g>=1e6?(g/1e6).toFixed(1)+"M":
g>=1e3?(g/1e3).toFixed(1)+"K":g;
}

/* LOAD DATA */
async function loadData(){

const res=await fetch('https://brainrot-dashboard-ichq.onrender.com/detections');
const data=await res.json();

document.getElementById('total').innerText=data.total||0;

const best=data.detections.sort((a,b)=>b.gen-a.gen)[0];
document.getElementById('best').innerText=best?
best.name+" ("+formatGen(best.gen)+")":"None";

const newC=document.getElementById('new-detections');
const oldC=document.getElementById('old-detections');
const pNew=document.getElementById('priority-new');

newC.innerHTML="";
oldC.innerHTML="";
pNew.innerHTML="";

data.detections.forEach(d=>{

if(d.gen<50000)return;

const expired=(Date.now()-d.timestamp)/1000>60;

let cls="card";
let tag="";

/* NORMAL */
if(d.gen<2500000){

if(d.gen>=1000000) tag="<span class='best'>BEST</span>";

const card=`
<div class="${cls}">
<h3>${d.name}</h3>
<p>${formatGen(d.gen)} ${tag}</p>
</div>
`;

expired?oldC.innerHTML+=card:newC.innerHTML+=card;

}

/* PRIORITY */
else{

if(d.gen>=100000000){
cls+=" insane";
tag="<span class='top'>💀 100M+</span>";
}else if(d.gen>=10000000){
cls+=" prio";
tag="<span class='top'>TOP PRIORITY</span>";
}

pNew.innerHTML+=`
<div class="${cls}">
<h3>${d.name}</h3>
<p>${formatGen(d.gen)} ${tag}</p>
</div>
`;

}

});

/* LEADERBOARD */
const top=document.getElementById('top-brainrots');
const global=document.getElementById('global-finds');

top.innerHTML="";
global.innerHTML="";

const sorted=[...data.detections].sort((a,b)=>b.gen-a.gen);

sorted.slice(0,10).forEach(d=>{
top.innerHTML+=`<li>${d.name} (${formatGen(d.gen)})</li>`;
});

sorted.forEach(d=>{
global.innerHTML+=`<li>${d.name} (${formatGen(d.gen)})</li>`;
});

}

/* RAIN */
const canvas=document.getElementById("rain");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let drops=[];
for(let i=0;i<200;i++){
drops.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:5});
}

function rain(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(150,150,255,0.2)";
drops.forEach(d=>{
ctx.fillRect(d.x,d.y,2,10);
d.y+=d.s;
if(d.y>canvas.height){
d.y=0;
d.x=Math.random()*canvas.width;
}
});
}

setInterval(rain,30);

</script>

</body>
</html>
